spring.application.name=apigateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Dynamic Routing
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Rewrite Path
spring.cloud.gateway.server.webflux.default-filters[0]=RewritePath=/(?<service>[^/]+)/(?<remaining>.*), /${remaining}

# Swagger Aggregation
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/authservice/v3/api-docs

springdoc.swagger-ui.urls[1].name=Session Service
springdoc.swagger-ui.urls[1].url=/sessionservice/v3/api-docs

springdoc.swagger-ui.urls[2].name=Review Service
springdoc.swagger-ui.urls[2].url=/reviewservice/v3/api-docs

springdoc.swagger-ui.urls[3].name=Skill Service
springdoc.swagger-ui.urls[3].url=/skillservice/v3/api-docs

springdoc.swagger-ui.urls[4].name=Group Service
springdoc.swagger-ui.urls[4].url=/groupservice/v3/api-docs

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
